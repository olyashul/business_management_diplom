<div class="task-item p-4 mb-3 bg-white rounded-lg border border-gray-200 shadow-sm hover:shadow-md transition-all duration-200"
     id="task-{{ task.id }}">
    <div class="flex justify-between items-center">
        <div>
            <span class="text-gray-900 font-medium block">
                {{ task.title }}
            </span>
            <span class="text-sm text-gray-500">
                {{ task.date|date:"d.m.Y" }}
            </span>
        </div>
        
        <button onclick="deleteTask({{ task.id }})"
                class="text-red-500 hover:text-red-700 transition-colors p-2 bg-transparent border-0 cursor-pointer">
            <i class="fas fa-trash"></i>
        </button>
    </div>
</div>
