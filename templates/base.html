<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KORP - Управление торговым предприятием{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts для Charis SIL -->
    <link href="https://fonts.googleapis.com/css2?family=Charis+SIL:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Charis SIL', serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
        }
        
        .header-nav {
            font-family: 'Charis SIL', serif;
            font-weight: 700;
            font-size: 16px; /* Чуть уменьшил */
            letter-spacing: 0.8px;
            line-height: 35px;
            color: #1565c0;
        }
        
        .header-title {
            font-family: 'Charis SIL', serif;
            font-weight: 700;
            font-size: 26px; /* Уменьшил с 30px */
            letter-spacing: 1.3px;
            line-height: 30px; /* Уменьшил с 35px */
            color: #101112;
        }
        
        .text-normal {
            font-family: 'Charis SIL', serif;
            font-weight: 700;
            font-size: 15px; /* Уменьшил с 17px */
            letter-spacing: 0.75px;
            line-height: 30px; /* Уменьшил с 35px */
            color: #101112;
        }
        
        .card-style {
            background-color: #f8fafc;
            border-radius: 12px; /* Уменьшил с 19px */
            border: 1px solid #cbd5e1;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .icon-btn {
            width: 36px; /* Уменьшил с 40px */
            height: 36px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .dotted-input {
            border: none;
            border-bottom: 2px dotted #94a3b8;
            background: transparent;
            outline: none;
            transition: border-color 0.3s ease;
            padding: 0.4rem 0; /* Уменьшил */
            width: 100%;
            font-family: 'Charis SIL', serif;
            font-size: 15px; /* Уменьшил */
            font-weight: 400;
        }
        
        .dotted-input:focus {
            border-bottom-color: #1565c0;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1565c0, #1976d2);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.6rem 1.5rem; /* Уменьшил */
            font-family: 'Charis SIL', serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #1976d2, #1e88e5);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(21, 101, 192, 0.2);
        }
        
        .btn-secondary {
            background: white;
            color: #1565c0;
            border: 2px solid #1565c0;
            border-radius: 8px;
            padding: 0.6rem 1.5rem;
            font-family: 'Charis SIL', serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: #f0f7ff;
        }
        
        /* Уменьшаем общие размеры */
        .form-container {
            max-width: 450px; /* Уменьшил */
            margin: 0 auto;
        }
        
        .profile-container {
            max-width: 1000px; /* Уменьшил с 1200px */
            margin: 0 auto;
        }
    </style>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Шапка с белым фоном -->
    <header class="header fixed top-0 left-0 w-full h-[46px] bg-white shadow-sm z-50">
        <div class="max-w-[1440px] mx-auto h-full px-4 relative">
            <!-- Иконка дома -->
            <a href="{% url 'accounts:profile' %}" class="absolute top-1/2 transform -translate-y-1/2 left-6">
                <div class="icon-btn">
                    <i class="fas fa-home text-[#1565c0] text-lg"></i>
                </div>
            </a>
            
            <!-- Навигация с увеличенными расстояниями -->
            <nav class="flex justify-center h-full items-center space-x-16"> <!-- Увеличил space-x-12 до space-x-16 -->
                <a href="#" onclick="showComingSoon('Продажи')" class="header-nav hover:text-blue-800 transition-colors">
                    Продажи
                </a>
                <a href="#" onclick="showComingSoon('Каталог')" class="header-nav hover:text-blue-800 transition-colors">
                    Каталог
                </a>
                <a href="#" onclick="showComingSoon('Персонал')" class="header-nav hover:text-blue-800 transition-colors">
                    Персонал
                </a>
                <a href="#" onclick="showComingSoon('Отчеты')" class="header-nav hover:text-blue-800 transition-colors">
                    Отчеты
                </a>
            </nav>
            
            <!-- Иконка профиля -->
            <a href="{% url 'accounts:profile' %}" class="absolute top-1/2 transform -translate-y-1/2 right-6">
                <div class="icon-btn">
                    <i class="fas fa-user text-[#1565c0] text-lg"></i>
                </div>
            </a>
            
            <!-- Линия под шапкой -->
            <div class="absolute bottom-0 left-0 w-full h-[2px] bg-gradient-to-r from-blue-600 via-blue-400 to-blue-600"></div>
        </div>
    </header>
    
    <!-- Основной контент -->
    <main class="pt-[60px] min-h-screen bg-gray-50">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Скрипты -->
    <script>
    function showComingSoon(feature) {
        alert(`Раздел "${feature}" находится в разработке. Скоро будет доступен!`);
    }
    
    // Обработка форм
    document.addEventListener('DOMContentLoaded', function() {
        // Обработка кликов по кнопкам
        document.querySelectorAll('.btn-primary, .btn-secondary').forEach(button => {
            button.addEventListener('click', function(e) {
                // Добавляем небольшую анимацию
                this.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });
        
        // Показываем/скрываем пароль
        const togglePasswordButtons = document.querySelectorAll('.toggle-password');
        togglePasswordButtons.forEach(button => {
            button.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        });
    });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
